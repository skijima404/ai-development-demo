apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: focus-time-timer-demo
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/example/ai-development-demo.git
    targetRevision: main
    path: deploy/gitops/focus-time-timer/overlays/demo
  destination:
    server: https://kubernetes.default.svc
    namespace: demo-apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
