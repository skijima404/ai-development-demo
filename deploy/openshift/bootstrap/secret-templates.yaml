apiVersion: v1
kind: Secret
metadata:
  name: git-auth
  namespace: demo-cicd
  annotations:
    ai-development-demo/template-note: Replace the placeholder values before apply.
type: Opaque
stringData:
  username: REPLACE_WITH_GIT_USERNAME
  password: REPLACE_WITH_GIT_TOKEN
---
apiVersion: v1
kind: Secret
metadata:
  name: github-webhook-secret
  namespace: demo-cicd
  annotations:
    ai-development-demo/template-note: Replace the placeholder values before apply.
type: Opaque
stringData:
  secretToken: REPLACE_WITH_GITHUB_WEBHOOK_SECRET
---
apiVersion: v1
kind: Secret
metadata:
  name: image-registry-auth
  namespace: demo-cicd
  annotations:
    ai-development-demo/template-note: Replace the placeholder values before apply.
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "image-registry.openshift-image-registry.svc:5000": {
          "auth": "REPLACE_WITH_BASE64_USERNAME_COLON_PASSWORD"
        }
      }
    }
